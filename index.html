<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>新見康樹 | 夢への一歩に、伴走する。</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;600;800&amp;family=Noto+Sans+JP:wght@300;400;500;700&amp;family=Cormorant+Garamond:ital,wght@0,500;1,500&amp;display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#0B1F33;
    --navy-light:#15324F;
    --navy-soft:#1E4263;
    --sky:#4FC3E8;
    --sky-deep:#2FA8D6;
    --sky-pale:#EAF6FB;
    --sky-pale-2:#DCEFF8;
    --white:#FFFFFF;
    --ink:#16242E;
    --ink-soft:#46586A;
    --mist:#9FB8C9;
    --line:rgba(79,195,232,0.25);
    --shadow: 0 20px 60px rgba(11,31,51,0.18);
  }
  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    margin:0;
    background:var(--white);
    color:var(--ink);
    font-family:'Noto Sans JP', sans-serif;
    font-weight:300;
    line-height:1.9;
    -webkit-font-smoothing:antialiased;
    overflow-x:hidden;
  }
  h1,h2,h3,.serif{
    font-family:'Shippori Mincho', serif;
    font-weight:600;
    letter-spacing:.04em;
  }
  .en{
    font-family:'Cormorant Garamond', serif;
    font-style:italic;
  }
  a{color:inherit;text-decoration:none;}
  img{max-width:100%;display:block;}
  .wrap{max-width:1080px;margin:0 auto;padding:0 28px;}
  .eyebrow{
    display:inline-flex;align-items:center;gap:10px;
    font-family:'Cormorant Garamond', serif;
    font-size:15px; letter-spacing:.3em; text-transform:uppercase;
    color:var(--sky-deep);
    margin-bottom:18px;
  }
  .eyebrow::before{content:"";width:30px;height:1px;background:var(--sky-deep);display:inline-block;}

  /* ===== Nav ===== */
  .nav{
    position:fixed; top:0; left:0; right:0; z-index:200;
    display:flex; align-items:center; justify-content:space-between;
    padding:22px 36px;
    mix-blend-mode:normal;
    transition:background .4s ease, padding .4s ease, box-shadow .4s ease;
  }
  .nav.scrolled{
    background:rgba(11,31,51,0.86);
    backdrop-filter:blur(10px);
    padding:14px 36px;
    box-shadow:0 8px 30px rgba(0,0,0,.15);
  }
  .nav-logo{
    font-family:'Shippori Mincho',serif; color:var(--white); font-size:18px; letter-spacing:.12em;
  }
  .nav-links{display:flex; gap:34px; list-style:none; margin:0; padding:0;}
  .nav-links a{
    color:var(--mist); font-size:13.5px; letter-spacing:.12em; font-weight:400;
    position:relative; padding-bottom:4px;
  }
  .nav-links a::after{
    content:""; position:absolute; left:0; bottom:0; width:0; height:1px; background:var(--sky);
    transition:width .3s ease;
  }
  .nav-links a:hover::after{width:100%;}
  .nav-cta{
    border:1px solid var(--sky); color:var(--sky)!important; padding:9px 20px; border-radius:999px;
    font-size:12.5px; letter-spacing:.1em;
  }
  .nav-cta:hover{background:var(--sky); color:var(--navy)!important;}
  .nav-toggle{
    display:none; flex-direction:column; justify-content:space-between;
    width:28px; height:20px; background:none; border:none; cursor:pointer; padding:0;
  }
  .nav-toggle span{display:block; width:100%; height:2px; background:var(--white); border-radius:2px; transition:.3s;}
  .nav-toggle.open span:nth-child(1){transform:translateY(9px) rotate(45deg);}
  .nav-toggle.open span:nth-child(2){opacity:0;}
  .nav-toggle.open span:nth-child(3){transform:translateY(-9px) rotate(-45deg);}

  /* ===== Hero ===== */
  .hero{
    position:relative; min-height:100vh; display:flex; align-items:center;
    background:radial-gradient(120% 100% at 80% 10%, #163654 0%, var(--navy) 55%, #081522 100%);
    overflow:hidden;
    color:var(--white);
    padding-top:90px;
  }
  .hero-glow{
    position:absolute; width:620px; height:620px; border-radius:50%;
    right:-160px; top:-120px;
    background:radial-gradient(circle, rgba(79,195,232,0.55) 0%, rgba(79,195,232,0.08) 55%, transparent 70%);
    filter:blur(10px);
    animation:drift 14s ease-in-out infinite alternate;
  }
  @keyframes drift{
    0%{transform:translate(0,0) scale(1);}
    100%{transform:translate(-30px,40px) scale(1.08);}
  }
  .hero-lines{
    position:absolute; inset:0; opacity:.5; pointer-events:none;
  }
  .hero-inner{position:relative; z-index:2; width:100%;}
  .hero-grid{
    display:grid; grid-template-columns:1.2fr .8fr; gap:50px; align-items:end;
  }
  .hero-kicker{
    font-family:'Cormorant Garamond',serif; font-style:italic; color:var(--sky);
    font-size:18px; letter-spacing:.2em; margin-bottom:22px; display:block;
  }
  .hero h1{
    font-size:clamp(34px, 5.4vw, 66px);
    line-height:1.5; margin:0 0 28px; color:var(--white);
  }
  .hero h1 .accent{color:var(--sky);}
  .hero p.lead{
    color:var(--mist); font-weight:300; font-size:16px; max-width:480px; line-height:2;
  }
  .hero-side{
    border-left:1px solid var(--line); padding-left:34px;
  }
  .hero-side-name{font-size:13px; color:var(--mist); letter-spacing:.18em; margin-bottom:10px;}
  .hero-side-role{font-family:'Shippori Mincho',serif; font-size:22px; color:var(--white); margin-bottom:18px;}
  .hero-side-text{font-size:13.5px; color:var(--mist); line-height:1.9;}
  .hero-cta-row{display:flex; gap:16px; margin-top:42px; flex-wrap:wrap;}
  .btn{
    display:inline-flex; align-items:center; gap:10px;
    padding:15px 32px; border-radius:999px; font-size:13.5px; letter-spacing:.12em;
    transition:all .3s ease; cursor:pointer; border:1px solid transparent;
  }
  .btn-primary{background:var(--sky); color:var(--navy); font-weight:500;}
  .btn-primary:hover{background:var(--white); transform:translateY(-2px); box-shadow:0 12px 30px rgba(79,195,232,.35);}
  .btn-ghost{border-color:rgba(255,255,255,.35); color:var(--white);}
  .btn-ghost:hover{border-color:var(--sky); color:var(--sky); transform:translateY(-2px);}
  .scroll-cue{
    position:absolute; bottom:36px; left:50%; transform:translateX(-50%);
    display:flex; flex-direction:column; align-items:center; gap:10px;
    color:var(--mist); font-size:11px; letter-spacing:.3em;
  }
  .scroll-cue .stick{width:1px; height:46px; background:linear-gradient(var(--sky), transparent); animation:stickmove 2s ease-in-out infinite;}
  @keyframes stickmove{0%,100%{opacity:.3;}50%{opacity:1;}}

  /* ===== Section generic ===== */
  section{position:relative; padding:130px 0;}
  .section-pale{background:var(--sky-pale);}
  .section-title{font-size:clamp(26px,3.4vw,38px); margin:0 0 26px;}

  /* ===== About ===== */
  .about-grid{display:grid; grid-template-columns:.9fr 1.1fr; gap:70px; align-items:center;}
  .about-visual{
    position:relative; aspect-ratio:4/5; border-radius:8px;
    background:linear-gradient(155deg, var(--navy) 0%, var(--navy-soft) 55%, var(--sky-deep) 130%);
    display:flex; align-items:center; justify-content:center; overflow:hidden;
  }
  .about-visual svg{width:78%; height:78%;}
  .about-visual img{width:100%; height:100%; object-fit:cover; object-position:top center; position:relative; z-index:1;}
  .about-visual::after{
    content:""; position:absolute; inset:0;
    background:repeating-linear-gradient(115deg, transparent 0 26px, rgba(255,255,255,.04) 26px 27px);
  }
  .about-tag{
    position:absolute; bottom:24px; left:24px; color:var(--white); font-size:12px; letter-spacing:.2em;
    border:1px solid rgba(255,255,255,.3); padding:8px 16px; border-radius:999px; z-index:2;
    background:rgba(11,31,51,.35); backdrop-filter:blur(4px);
  }
  .about-text h2{margin-top:0;}
  .about-text p{color:var(--ink-soft); font-size:15.5px;}
  .about-facts{display:grid; grid-template-columns:1fr 1fr; gap:18px 28px; margin-top:36px; padding-top:30px; border-top:1px solid var(--sky-pale-2);}
  .about-fact dt{font-size:11.5px; letter-spacing:.16em; color:var(--sky-deep); margin-bottom:6px;}
  .about-fact dd{margin:0; font-size:14.5px; color:var(--ink);}

  /* ===== Story / timeline ===== */
  .story-head{max-width:640px; margin-bottom:70px;}
  .timeline{position:relative; display:grid; gap:0;}
  .timeline-track{
    position:absolute; left:19px; top:6px; bottom:6px; width:2px;
    background:linear-gradient(var(--sky-pale-2), var(--sky-pale-2));
  }
  .timeline-track-fill{
    position:absolute; left:0; top:0; width:100%; height:0%;
    background:linear-gradient(var(--sky), var(--sky-deep));
    transition:height 1.2s ease;
  }
  .t-item{
    position:relative; padding:0 0 56px 64px; opacity:0; transform:translateY(24px);
    transition:opacity .7s ease, transform .7s ease;
  }
  .t-item.show{opacity:1; transform:translateY(0);}
  .t-item:last-child{padding-bottom:0;}
  .t-dot{
    position:absolute; left:10px; top:2px; width:20px; height:20px; border-radius:50%;
    background:var(--white); border:2px solid var(--sky); z-index:2;
  }
  .t-item.is-turn .t-dot{background:var(--navy); border-color:var(--navy);}
  .t-year{font-family:'Cormorant Garamond',serif; font-style:italic; color:var(--sky-deep); font-size:15px; letter-spacing:.08em;}
  .t-title{font-family:'Shippori Mincho',serif; font-size:19px; margin:6px 0 10px;}
  .t-text{color:var(--ink-soft); font-size:14.5px; max-width:620px;}
  .t-item.is-turn .t-title{color:var(--navy);}

  .story-quote{
    margin-top:90px; padding:54px 60px; background:var(--navy); border-radius:6px; color:var(--white);
    position:relative; overflow:hidden;
  }
  .story-quote::before{
    content:"”"; position:absolute; font-family:'Shippori Mincho',serif; font-size:220px; color:rgba(79,195,232,.15);
    right:24px; top:-60px; line-height:1;
  }
  .story-quote p{
    font-family:'Shippori Mincho',serif; font-size:clamp(18px,2.3vw,24px); line-height:2; margin:0; max-width:680px; position:relative; z-index:1;
  }
  .story-quote span{display:block; margin-top:24px; font-size:13px; letter-spacing:.2em; color:var(--sky);}

  /* ===== MVV ===== */
  .mvv-top{display:grid; grid-template-columns:1fr 1fr; gap:30px; margin-bottom:30px;}
  .mvv-card{
    background:var(--white); border:1px solid var(--sky-pale-2); border-radius:6px; padding:46px 40px;
    box-shadow:var(--shadow);
  }
  .mvv-card.dark{
    background:var(--navy); color:var(--white); border:none;
  }
  .mvv-num{font-family:'Cormorant Garamond',serif; font-style:italic; font-size:14px; color:var(--sky-deep); letter-spacing:.2em;}
  .mvv-card.dark .mvv-num{color:var(--sky);}
  .mvv-card h3{font-size:24px; margin:14px 0 16px;}
  .mvv-card p{font-size:14.5px; color:var(--ink-soft); margin:0;}
  .mvv-card.dark p{color:var(--mist);}

  .value-row{display:grid; grid-template-columns:repeat(3,1fr); gap:26px;}
  .value-item{
    padding:36px 28px; border-radius:6px; background:var(--sky-pale);
    border-top:3px solid var(--sky);
  }
  .value-item h4{font-size:18px; margin:0 0 10px; font-family:'Shippori Mincho',serif;}
  .value-item p{font-size:13.5px; color:var(--ink-soft); margin:0;}

  /* ===== Booking / CTA ===== */
  .booking{
    background:linear-gradient(135deg, var(--navy) 0%, #0E2A44 60%, var(--navy) 100%);
    color:var(--white); text-align:center; position:relative; overflow:hidden;
  }
  .booking::before{
    content:""; position:absolute; width:500px; height:500px; border-radius:50%; left:50%; top:50%;
    transform:translate(-50%,-50%); background:radial-gradient(circle, rgba(79,195,232,.18), transparent 70%);
  }
  .booking-inner{position:relative; z-index:1; max-width:620px; margin:0 auto;}
  .booking h2{margin:18px 0 22px;}
  .booking p{color:var(--mist); font-size:15px; margin-bottom:40px;}

  /* ===== SNS ===== */
  .sns-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:18px; margin-top:50px;}
  .sns-card{
    background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.14); border-radius:6px;
    padding:26px 18px; text-align:center; transition:all .3s ease;
  }
  .sns-card:hover{background:rgba(79,195,232,.12); border-color:var(--sky); transform:translateY(-4px);}
  .sns-card svg{width:26px; height:26px; margin:0 auto 14px; display:block;}
  .sns-card span{font-size:12.5px; letter-spacing:.12em; color:var(--white); line-height:1.6;}

  /* ===== Footer ===== */
  footer{background:#081420; color:var(--mist); padding:60px 0 30px; text-align:center;}
  footer .f-name{font-family:'Shippori Mincho',serif; color:var(--white); font-size:18px; margin-bottom:10px;}
  footer .f-line{font-size:12.5px; letter-spacing:.1em; margin-bottom:30px;}
  footer .f-copy{font-size:11px; color:#4C6072; border-top:1px solid rgba(255,255,255,.08); padding-top:24px;}

  /* reveal */
  .reveal{opacity:0; transform:translateY(30px); transition:opacity .8s ease, transform .8s ease;}
  .reveal.show{opacity:1; transform:translateY(0);}

  @media (max-width:880px){
    .nav-toggle{display:flex;}
    .nav-links{
      display:none; position:fixed; top:60px; left:0; right:0; bottom:0;
      background:rgba(11,31,51,.97); flex-direction:column; align-items:center;
      justify-content:center; gap:32px; z-index:9999;
    }
    .nav-links.open{display:flex;}
    .nav-links a{font-size:18px;}
    .nav-cta{display:none;}
    .hero-grid{grid-template-columns:1fr;}
    .hero-side{border-left:none; padding-left:0; border-top:1px solid var(--line); padding-top:28px;}
    .about-grid{grid-template-columns:1fr;}
    .mvv-top{grid-template-columns:1fr;}
    .value-row{grid-template-columns:1fr;}
    .sns-grid{grid-template-columns:repeat(3,1fr);}
    section{padding:90px 0;}
    .story-quote{padding:36px 26px;}
  }
  @media (prefers-reduced-motion: reduce){
    *{animation:none!important; transition:none!important;}
  }
</style>
</head>
